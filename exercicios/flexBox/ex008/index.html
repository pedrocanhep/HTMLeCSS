<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox</title>
  <style>
    * {
       border: none;
      margin: none;
    }

    .container {
      background-color: #51f;
      display: flex;
      flex-flow: row wrap;
    }

    .item {
      background-color: #aaffaa;
      border: 1px solid #000;
      text-align: center;
      flex-basis: 100px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">Pedro</div>
    <div class="item">Lorem ipsum</div>
    <div class="item">Clemilson</div>
    <div class="item">Bru</div>
    <div class="item">Joelma Eliana</div>
    <div class="item">Miguelzin</div>
    <div class="item">A</div>
  </div>
</body>
</html>
