<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox</title>
  <style>
    * {
      padding: none;
      margin: none;
    }

    body {
      height: 97vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: #51f;
      height: 100px;
      width: 300px;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
 
    .item {
      background-color: #aaffaa;
      border: 1px solid #000;
      text-align: center;
      height: 20px;
      padding: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="item">Como</p>
    <p class="item">Centralizar</p>
    <p class="item">Uma div</p>
  </div>
</body>
</html>
