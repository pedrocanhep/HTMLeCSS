<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox</title>
  <style>
    * {
      padding: none;
      margin: none;
    }

    .container {
      background-color: #51f;
      height: 100px;
      display: flex;
      justify-content: space-evenly;
      align-items: end;
    }
 
    .item {
      background-color: #aaffaa;
      border: 1px solid #000;
      text-align: center;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="item">Exemplo 1</p>
    <p class="item">Exemplo 2</p>
    <p class="item">Exemplo 3</p>
    <p class="item">Exemplo 4</p>
    <p class="item">Exemplo 5</p>
    <p class="item">Exemplo 6</p>
    <p class="item">Exemplo 7</p>
  </div>
</body>
</html>
