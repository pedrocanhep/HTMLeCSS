<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox</title>
  <style>
    * {
      border: none;
      margin: none;
    }

    .container {
      background-color: #51f;
      display: flex;
      /* flex-direction: row-reverse;
      flex-wrap: wrap; */
      flex-flow: row wrap;
      padding: 5px;
    }
 
    .item {
      background-color: #aaffaa;
      border: 1px solid #000;
      margin: 0;

      flex: auto;
      font-family: monospace;
      font-size: 1.2em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="item">Exemplo 1</p>
    <p class="item">Exemplo 2</p>
    <p class="item">Exemplo 3</p>
    <p class="item">Exemplo 4</p>
    <p class="item">Exemplo 5</p>
    <p class="item">Exemplo 6</p>
    <p class="item">Exemplo 7</p>
  </div>
</body>
</html>
