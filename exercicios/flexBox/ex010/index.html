<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlexBox</title>
  <style>
    * {
       border: none;
      margin: none;
    }

    .container {
      background-color: #51f;
      display: flex;
      flex-flow: row nowrap;
    }

    .item {
      background-color: #aaffaa;
      border: 1px solid #000;
      text-align: center;
      flex-basis: 100px;
    }

    .item:nth-child(1) {
      /*flex-basis: 150px;
      flex-grow: 4;
      flex-shrink: 2;*/
      flex: 4 2 150px;
    }
    .item:nth-child(2) {
      /*flex-basis: 150px;
      flex-grow: 1;
      flex-shrink: 1;*/
      flex: 1 1 150px;
    }
    .item:nth-child(3) {
      /*flex-basis: 150px;
      flex-grow: 2;
      flex-shrink: 0;*/
      flex: 2 0 150px;
    }
    .item:nth-child(4) {
      /*flex-basis: 150px;
      flex-grow: 3;
      flex-shrink: 4;*/
      flex: 3 4 150px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">Pedro</div>
    <div class="item">Clemilson</div>
    <div class="item">Joelma Eliana</div>
    <div class="item">Guel</div>
  </div>
</body>
</html>
